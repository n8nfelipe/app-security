services:
  backend:
    build:
      context: ./app/backend
    privileged: true
    network_mode: "host"
    pid: "host"
    environment:
      APPSEC_API_TOKEN: changeme-token
      APPSEC_CORS_ORIGINS: '["http://localhost:5173","http://localhost:8080"]'
      APPSEC_DATABASE_URL: sqlite:////srv/data/app_security_audit.db
      APPSEC_EXPORT_DIR: /srv/data/exports
      APPSEC_HOST_FS_PREFIX: /host
    volumes:
      - ./data/backend:/srv/data
      - /:/host:ro

  frontend:
    build:
      context: ./app/frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      VITE_API_TOKEN: changeme-token
    ports:
      - "8080:80"
    depends_on:
      - backend
