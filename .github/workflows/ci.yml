name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          cd app/backend
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          source app/backend/.venv/bin/activate
          pytest app/backend/tests -v --cov=app --cov-report=xml

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: cd app/frontend && npm ci
      - name: Run tests
        run: cd app/frontend && npm run test

  build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build backend
        run: |
          cd app/backend
          python -m venv .venv
          source .venv/bin/activate
          pip install -e .
          python -m build
      - name: Build frontend
        run: |
          cd app/frontend
          npm install
          npm run build

  release:
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine version bump
        id: version
        run: |
          git fetch --tags
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LAST_VERSION=${LAST_TAG#v}
          
          MAJOR=$(git log --format=%s HEAD~30..HEAD | grep -c "^BREAKING CHANGE" || echo "0")
          MINOR=$(git log --format=%s HEAD~30..HEAD | grep -c "^feat" || echo "0")
          PATCH=$(git log --format=%s HEAD~30..HEAD | grep -c "^fix" || echo "0")
          
          MAJ=$(echo $LAST_VERSION | cut -d. -f1)
          MIN=$(echo $LAST_VERSION | cut -d. -f2)
          PAT=$(echo $LAST_VERSION | cut -d. -f3)
          
          if [ "$MAJOR" -gt 0 ]; then
            NEW_VERSION="$((MAJ+1)).0.0"
          elif [ "$MINOR" -gt 0 ]; then
            NEW_VERSION="$MAJ.$((MIN+1)).0"
          elif [ "$PATCH" -gt 0 ]; then
            NEW_VERSION="$MAJ.$MIN.$((PAT+1))"
          else
            echo "version=no-bump" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
      - name: Create tag
        if: steps.version.outputs.version != 'no-bump'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.version.outputs.version }}
          git push origin v${{ steps.version.outputs.version }}