name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          cd app/backend
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          source app/backend/.venv/bin/activate
          pytest app/backend/tests -v --cov=app --cov-report=xml

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          cd app/frontend
          npm install --legacy-peer-deps
      - name: Run tests
        run: cd app/frontend && npm run test

  build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build backend
        run: |
          cd app/backend
          python -m venv .venv
          source .venv/bin/activate
          pip install -e .
          pip install build
          python -m build
      - name: Build frontend
        run: |
          cd app/frontend
          npm install --legacy-peer-deps
          npm run build

  release:
    name: Generate Tag
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Bump version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
          MAJOR_STRING_TOKEN: "#major"
          MINOR_STRING_TOKEN: "#minor"
          PATCH_STRING_TOKEN: "#patch"
          PRERELEASE: false